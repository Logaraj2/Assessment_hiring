[build]
  publish = "frontend"
  functions = "functions"
# Deploy fix: Remove API error messages

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "18"

[dev]
  functions = "functions"
  publish = "frontend"
  port = 8888
