<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Assessment & Learning Plan Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 32px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            resize: vertical;
            min-height: 150px;
            transition: border-color 0.3s;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .output-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .output-box {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }

        .output-box h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .assessment-message {
            background: white;
            padding: 15px;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            margin-bottom: 15px;
            line-height: 1.6;
            color: #333;
        }

        .learning-plan {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #f0f0f0;
        }

        .learning-plan h4 {
            color: #667eea;
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .learning-plan ul {
            margin-left: 20px;
            color: #666;
            line-height: 1.8;
            font-size: 14px;
        }

        .learning-plan li {
            margin-bottom: 8px;
        }

        .skill-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 4px 4px 4px 0;
            font-weight: 600;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .code-block {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }

        .footer {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Skill Assessment & Learning Plan Agent</h1>
            <p>AI-powered conversational assessment with personalized learning roadmap</p>
        </div>

        <div class="input-section">
            <div class="form-group">
                <label for="jobDesc">Job Description</label>
                <textarea id="jobDesc" placeholder="Paste the job description here..."></textarea>
            </div>

            <div class="form-group">
                <label for="resume">Candidate Resume</label>
                <textarea id="resume" placeholder="Paste the candidate's resume here..."></textarea>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="startAssessment()">Start Assessment</button>
                <button class="btn-secondary" onclick="loadSample()">Load Sample</button>
            </div>
        </div>

        <div class="output-section">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('assessment')">Assessment Chat</button>
                <button class="tab-btn" onclick="switchTab('plan')">Learning Plan</button>
            </div>

            <div id="assessment" class="tab-content active">
                <div class="loading" id="assessmentLoading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px; color: #667eea;">Analyzing skills...</p>
                </div>
                <div class="output-box" id="assessmentOutput" style="display: none;">
                    <h3>💬 Assessment Results</h3>
                    <div id="assessmentContent"></div>
                </div>
            </div>

            <div id="plan" class="tab-content">
                <div class="loading" id="planLoading" style="display: none;">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px; color: #667eea;">Generating learning plan...</p>
                </div>
                <div class="output-box" id="planOutput" style="display: none;">
                    <h3>📚 Personalized Learning Plan</h3>
                    <div id="planContent"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Powered by Claude AI | Deccan AI Catalyst Hackathon 2026</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';

        async function startAssessment() {
            const jobDesc = document.getElementById('jobDesc').value.trim();
            const resume = document.getElementById('resume').value.trim();

            if (!jobDesc || !resume) {
                alert('Please provide both job description and resume');
                return;
            }

            showLoading('assessment', true);
            try {
                const response = await fetch(`${API_BASE}/quick-assessment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ job_description: jobDesc, resume: resume })
                });

                const data = await response.json();
                displayAssessment(data);
                generateLearningPlan(data);
            } catch (error) {
                showError('Assessment', error.message);
            }
        }

        function displayAssessment(data) {
            const content = document.getElementById('assessmentContent');
            let html = '';

            if (data.skills_assessed) {
                html += '<h4>Skills Assessment</h4>';
                data.skills_assessed.forEach(skill => {
                    html += `
                        <div class="assessment-message">
                            <strong>${skill.skill}</strong><br>
                            Level: <span class="skill-tag">${skill.proficiency_level}</span><br>
                            Evidence: ${skill.evidence}<br>
                            Gap Analysis: ${skill.gap_analysis}
                        </div>
                    `;
                });

                if (data.recommended_focus_areas) {
                    html += '<h4>Focus Areas</h4>';
                    data.recommended_focus_areas.forEach(area => {
                        html += `<div class="skill-tag">${area}</div>`;
                    });
                }
            } else if (data.assessment) {
                html = `<div class="assessment-message">${formatText(data.assessment)}</div>`;
            } else {
                html = `<pre class="code-block">${JSON.stringify(data, null, 2)}</pre>`;
            }

            content.innerHTML = html;
            showLoading('assessment', false);
            document.getElementById('assessmentOutput').style.display = 'block';
        }

        async function generateLearningPlan(assessmentData) {
            showLoading('plan', true);
            try {
                const response = await fetch(`${API_BASE}/generate-plan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        assessment_results: assessmentData,
                        candidate_name: 'Candidate'
                    })
                });

                const data = await response.json();
                displayLearningPlan(data);
            } catch (error) {
                showError('Learning Plan', error.message);
            }
        }

        function displayLearningPlan(data) {
            const content = document.getElementById('planContent');
            let html = '';

            if (data.learning_plan.learning_path) {
                data.learning_plan.learning_path.forEach((phase, idx) => {
                    html += `
                        <div class="learning-plan">
                            <h4>Phase ${idx + 1}: ${phase.title}</h4>
                            <p><strong>Duration:</strong> ${phase.duration_weeks} weeks</p>
                            <p><strong>Skills:</strong></p>
                            <div>${phase.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
                            <p style="margin-top: 10px;"><strong>Resources:</strong></p>
                            <ul>
                                ${phase.resources.map(r => `
                                    <li>${r.title} (${r.type}) - ${r.estimated_hours}h</li>
                                `).join('')}
                            </ul>
                            <p style="margin-top: 10px;"><strong>Project:</strong> ${phase.project}</p>
                        </div>
                    `;
                });

                html += `<div class="learning-plan" style="margin-top: 20px;">
                    <h4>Total Duration</h4>
                    <p>${data.learning_plan.total_duration_weeks} weeks</p>
                    <h4>Success Metrics</h4>
                    <ul>${data.learning_plan.success_metrics.map(m => `<li>${m}</li>`).join('')}</ul>
                </div>`;
            } else {
                html = `<pre class="code-block">${JSON.stringify(data, null, 2)}</pre>`;
            }

            content.innerHTML = html;
            showLoading('plan', false);
            document.getElementById('planOutput').style.display = 'block';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function showLoading(section, show) {
            document.getElementById(`${section}Loading`).style.display = show ? 'block' : 'none';
        }

        function showError(section, message) {
            const content = document.getElementById(`${section.toLowerCase()}Content`);
            content.innerHTML = `<div class="status-message status-error">Error: ${message}</div>`;
            showLoading(section.toLowerCase(), false);
            document.getElementById(`${section.toLowerCase()}Output`).style.display = 'block';
        }

        function formatText(text) {
            return text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        function loadSample() {
            document.getElementById('jobDesc').value = `Senior Full-Stack Engineer

We're looking for a Senior Full-Stack Engineer to join our team. You'll work on our platform using Python, React, and cloud technologies.

Required Skills:
- 5+ years of software development experience
- Python (Django/FastAPI)
- React and JavaScript
- AWS/Cloud platforms
- SQL and Database Design
- RESTful API Design
- Git and CI/CD
- Problem-solving and communication

Nice to have:
- Docker and Kubernetes
- Microservices architecture
- GraphQL
- ML/AI integration`;

            document.getElementById('resume').value = `John Doe
Email: john@example.com | GitHub: github.com/johndoe

SUMMARY
5 years of full-stack development experience. Built scalable web applications using Python and React. Currently working at TechCorp on cloud-based solutions.

SKILLS
Python, Django, FastAPI, JavaScript, React, HTML/CSS, PostgreSQL, AWS EC2/S3, Git, REST APIs, Docker

EXPERIENCE
Senior Developer - TechCorp (2021-Present)
- Built REST APIs using FastAPI
- Developed React dashboards for 100K+ users
- Managed AWS infrastructure
- Mentored junior developers

Full Stack Developer - StartupXYZ (2019-2021)
- Developed Django web applications
- Implemented React frontend components
- Database design and optimization
- Deployed on AWS using Docker

EDUCATION
BS Computer Science - State University (2019)

CERTIFICATIONS
AWS Solutions Architect Associate (2022)`;
        }
    </script>
</body>
</html>
